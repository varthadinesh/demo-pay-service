<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bubbleGrad" x1="60" y1="70" x2="300" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A8CFF"/>
      <stop offset="55%" stop-color="#5B4DE0"/>
      <stop offset="100%" stop-color="#4B2FD1"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="180" y1="70" x2="420" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2FD8B8"/>
      <stop offset="100%" stop-color="#17B091"/>
    </linearGradient>
  </defs>

  <!-- Tail flap, drawn first so its base is hidden beneath the bubble circle -->
  <path d="M145 255 L200 288 L128 342 Q118 348 120 336 Z" fill="url(#bubbleGrad)"/>

  <!-- Chat-bubble circle: the O of OntmPay -->
  <circle cx="195" cy="190" r="115" fill="url(#bubbleGrad)"/>

  <!-- Overlapping plain circle -->
  <circle cx="285" cy="190" r="115" fill="url(#circleGrad)" opacity="0.86" style="mix-blend-mode:multiply"/>

  <!-- Accent dot -->
  <circle cx="140" cy="345" r="15" fill="#F5A623"/>
</svg>
